<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>温湿度数据查询 — 智能培养箱</title>
    <link rel="stylesheet" href="common.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="nav-brand" href="/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z"/><path d="M12 6v6l4 2"/></svg>
      智能培养箱
    </a>
    <div class="nav-links">
      <a href="/env.html" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"/></svg>
        <span>温湿度</span>
      </a>
      <a href="/colony.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
        <span>菌落图像</span>
      </a>
    </div>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <h1>温湿度数据查询</h1>
    <p>查询设备历史温度与湿度数据，支持图表可视化和 CSV 导出</p>
  </div>

  <div class="card">
    <div class="form-group">
      <label for="uuid">设备 UUID</label>
      <select class="form-input" id="uuid" disabled>
        <option value="">正在加载设备...</option>
      </select>
      <div class="selector-status" id="device-status">从阿里云 Tablestore 获取设备列表。</div>
    </div>

    <div class="query-row">
      <div class="custom-time">
        <div class="time-field">
          <label>起始时间</label>
          <input type="datetime-local" id="start-time">
        </div>
        <div class="time-field">
          <label>截止时间</label>
          <input type="datetime-local" id="end-time">
        </div>
      </div>

      <div class="quick-buttons">
        <button class="quick-btn" onclick="queryQuick(3600)">最近 1 小时</button>
        <button class="quick-btn" onclick="queryQuick(21600)">最近 6 小时</button>
        <button class="quick-btn" onclick="queryQuick(86400)">最近 24 小时</button>
        <button class="quick-btn" onclick="queryQuick(259200)">最近 3 天</button>
        <button class="quick-btn" onclick="queryQuick(604800)">最近 7 天</button>
      </div>
    </div>

    <button class="btn-primary" id="query-btn" onclick="queryCustom()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      查询数据
    </button>
  </div>

  <div id="error-message" class="alert alert-error" style="display:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
    <span></span>
  </div>

  <div id="summary-cards" class="summary-cards hidden">
    <div class="summary-card">
      <div class="summary-label">最新温度</div>
      <div class="summary-value" id="sum-latest-temp">--</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">最新湿度</div>
      <div class="summary-value" id="sum-latest-hum">--</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">温度范围</div>
      <div class="summary-value" id="sum-temp-range">--</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">湿度范围</div>
      <div class="summary-value" id="sum-hum-range">--</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">平均温度</div>
      <div class="summary-value" id="sum-avg-temp">--</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">平均湿度</div>
      <div class="summary-value" id="sum-avg-hum">--</div>
    </div>
  </div>

  <div class="chart-card">
    <div class="overlay-loading hidden" id="chart-loading">
      <div class="spinner"></div>
      加载数据中...
    </div>
    <div class="chart-hint" id="temp-chart-hint">请输入设备 UUID 并查询时间范围，以展示温度数据。</div>
    <canvas id="tempChart"></canvas>
  </div>

  <div class="chart-card">
    <div class="overlay-loading hidden" id="hum-chart-loading">
      <div class="spinner"></div>
      加载数据中...
    </div>
    <div class="chart-hint" id="hum-chart-hint">请输入设备 UUID 并查询时间范围，以展示湿度数据。</div>
    <canvas id="humChart"></canvas>
  </div>

  <div class="table-card">
    <div class="table-toolbar">
      <h3>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;color:var(--text-muted)"><path d="M12 3v18"/><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/></svg>
        数据明细
      </h3>
      <button class="btn-success hidden" id="export-btn" onclick="exportCSV()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
        导出 CSV
      </button>
    </div>
    <div class="overlay-loading hidden" id="table-loading">
      <div class="spinner"></div>
      加载数据中...
    </div>
    <div class="table-wrap">
      <table class="data-table" id="data-table">
        <thead>
          <tr>
            <th>时间</th>
            <th>温度 (℃)</th>
            <th>湿度 (%)</th>
          </tr>
        </thead>
        <tbody><tr><td colspan="3" class="table-empty-cell">请输入设备 UUID 并查询时间范围，以展示数据明细。</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script src="common.js"></script>
<script>
  var tempChart = null;
  var humChart = null;
  var currentData = null;
  var currentUUID = '';
  var chartStats = {};

  var annotationPlugin = {
    id: 'envAnnotations',
    afterDraw: function(chart) {
      var canvasId = chart.canvas.id;
      var s = chartStats[canvasId];
      if (!s) return;
      var ctx = chart.ctx;
      var xScale = chart.scales.x;
      var yScale = chart.scales.y;
      var xMin = xScale.left;
      var xMax = xScale.right;

      ctx.save();
      ctx.lineWidth = 1;

      ctx.setLineDash([6, 4]);
      ctx.strokeStyle = 'rgba(239, 68, 68, 0.45)';
      ctx.fillStyle = 'rgba(239, 68, 68, 0.7)';
      ctx.font = '600 10px Inter, sans-serif';
      var yAvg = yScale.getPixelForValue(s.avg);
      ctx.beginPath();
      ctx.moveTo(xMin, yAvg);
      ctx.lineTo(xMax, yAvg);
      ctx.stroke();
      ctx.fillText('avg ' + s.avg.toFixed(1), xMax + 6, yAvg + 3);

      ctx.strokeStyle = 'rgba(245, 158, 11, 0.4)';
      ctx.fillStyle = 'rgba(245, 158, 11, 0.65)';
      var yMax = yScale.getPixelForValue(s.max);
      ctx.beginPath();
      ctx.moveTo(xMin, yMax);
      ctx.lineTo(xMax, yMax);
      ctx.stroke();
      ctx.fillText('max ' + s.max.toFixed(1), xMax + 6, yMax + 3);

      ctx.strokeStyle = 'rgba(59, 130, 246, 0.4)';
      ctx.fillStyle = 'rgba(59, 130, 246, 0.65)';
      var yMin = yScale.getPixelForValue(s.min);
      ctx.beginPath();
      ctx.moveTo(xMin, yMin);
      ctx.lineTo(xMax, yMin);
      ctx.stroke();
      ctx.fillText('min ' + s.min.toFixed(1), xMax + 6, yMin + 3);

      ctx.restore();
    }
  };
  Chart.register(annotationPlugin);

  var syncTarget = null;
  var syncLock = false;

  function syncTooltip(sourceChart, targetChart) {
    if (syncLock) return;
    syncLock = true;
    var meta = targetChart.getDatasetMeta(0);
    if (meta.data.length > 0) {
      targetChart.setActiveElements([{datasetIndex: 0, index: syncTarget}]);
      targetChart.tooltip.setActiveElements([{datasetIndex: 0, index: syncTarget}], {x: 0, y: 0});
      targetChart.update('none');
    }
    syncLock = false;
  }

  function clearSyncedTooltip(chart) {
    if (syncLock) return;
    syncLock = true;
    chart.setActiveElements([]);
    chart.tooltip.setActiveElements([], {x: 0, y: 0});
    chart.update('none');
    syncLock = false;
  }

  function handleHover(chart, otherChart, e) {
    if (syncLock) return;
    var points = chart.getElementsAtEventForMode(e, 'index', {intersect: false}, false);
    if (points.length > 0) {
      syncTarget = points[0].index;
      syncTooltip(chart, otherChart);
    }
  }

  function makeTickFormatter(rangeMs) {
    var fmt;
    if (rangeMs <= 7200000) {
      fmt = function(d) { return pad2(d.getUTCHours()) + ':' + pad2(d.getUTCMinutes()) + ':' + pad2(d.getUTCSeconds()); };
    } else if (rangeMs <= 86400000) {
      fmt = function(d) { return pad2(d.getUTCHours()) + ':' + pad2(d.getUTCMinutes()); };
    } else {
      fmt = function(d) { return (d.getUTCMonth() + 1) + '/' + pad2(d.getUTCDate()) + ' ' + pad2(d.getUTCHours()) + ':' + pad2(d.getUTCMinutes()); };
    }
    return function(value) {
      return fmt(utcMsToBeijing(value));
    };
  }

  function makeGradient(ctx, color) {
    var c = ctx.canvas;
    var h = c.height || 400;
    var grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, color.replace(')', ', 0.25)').replace('rgb', 'rgba'));
    grad.addColorStop(0.6, color.replace(')', ', 0.05)').replace('rgb', 'rgba'));
    grad.addColorStop(1, color.replace(')', ', 0)').replace('rgb', 'rgba'));
    return grad;
  }

  function computeStats(data, key) {
    var sum = 0, min = Infinity, max = -Infinity;
    for (var i = 0; i < data.length; i++) {
      var v = data[i][key];
      sum += v;
      if (v < min) min = v;
      if (v > max) max = v;
    }
    return {min: min, max: max, avg: sum / data.length};
  }

  function syncLegendLabels(chart, stats) {
    var legend = chart.options.plugins.legend.labels;
    legend.generateLabels = function(chart) {
      var ds = chart.data.datasets[0];
      return [
        {text: ds.label + '  avg ' + stats.avg.toFixed(1), fillStyle: ds.borderColor, strokeStyle: ds.borderColor, lineWidth: 0, hidden: false, datasetIndex: 0, index: 0}
      ];
    };
  }

  function createOrUpdateChart(chartRef, canvasId, label, color, data, stats, rangeMs, gradColor) {
    var ctx = document.getElementById(canvasId).getContext('2d');

    if (!chartRef) {
      var gradient = makeGradient(ctx, gradColor);
      syncLegendLabels(chartRef || {options: {plugins: {legend: {labels: {}}}}}, stats);

      var chart = new Chart(ctx, {
        type: 'line',
        data: {
          datasets: [{
            label: label,
            data: data,
            borderColor: color,
            backgroundColor: gradient,
            borderWidth: 2,
            tension: 0.35,
            pointRadius: 0,
            pointHoverRadius: 5,
            pointHoverBackgroundColor: color,
            pointHoverBorderColor: '#fff',
            pointHoverBorderWidth: 2,
            fill: true
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          layout: { padding: { right: 56 } },
          animation: {duration: 600, easing: 'easeOutQuart'},
          interaction: {mode: 'index', intersect: false},
          plugins: {
            legend: {display: true, position: 'top', labels: {usePointStyle: true, pointStyle: 'circle', padding: 16, font: {size: 12, family: 'Inter', weight: '500'}}},
            tooltip: {
              backgroundColor: 'rgba(15, 23, 42, 0.92)',
              titleFont: {family: 'Inter', size: 12, weight: '600'},
              bodyFont: {family: 'Inter', size: 12},
              padding: {top: 10, bottom: 10, left: 14, right: 14},
              cornerRadius: 8,
              boxPadding: 4,
              callbacks: {
                title: function(ctx) { return formatBeijingFull(ctx[0].raw.x); }
              }
            }
          },
          scales: {
            x: {
              type: 'linear',
              ticks: {callback: makeTickFormatter(rangeMs), maxTicksLimit: 12, autoSkip: true, font: {size: 11, family: 'Inter'}, color: '#94a3b8'},
              grid: {color: 'rgba(0,0,0,0.04)', drawBorder: false},
              border: {display: false}
            },
            y: {
              title: {display: true, text: label, font: {size: 12, family: 'Inter', weight: '500'}, color: '#64748b'},
              ticks: {font: {size: 11, family: 'Inter'}, color: '#94a3b8', padding: 8},
              grid: {color: 'rgba(0,0,0,0.04)', drawBorder: false},
              border: {display: false}
            }
          }
        }
      });

      chart.options.onHover = function(e) {
        var other = canvasId === 'tempChart' ? humChart : tempChart;
        if (other) handleHover(chart, other, e);
      };

      return chart;
    }

    chartRef.data.datasets[0].data = data;
    chartRef.data.datasets[0].backgroundColor = makeGradient(chartRef.ctx, gradColor);
    syncLegendLabels(chartRef, stats);
    var tickFmt = makeTickFormatter(rangeMs);
    chartRef.options.scales.x.ticks.callback = tickFmt;
    chartRef.update();
    return chartRef;
  }

  async function doQuery(startMicro, endMicro) {
    var uuid = document.getElementById('uuid').value.trim();
    if (!uuid) {
      showError('请输入设备 UUID');
      return;
    }
    hideError();
    setChartHint('');
    setTableMessage('加载数据中...');
    document.getElementById('query-btn').disabled = true;
    showLoading(true);

    try {
      var url = '/api/env?uuid=' + encodeURIComponent(uuid) +
                '&start=' + startMicro + '&end=' + endMicro;
      var resp = await fetch(url);
      var data = await resp.json();

      if (!data.sucess) {
        showError(data.message || '查询失败');
        setChartHint('无法加载图表数据。');
        setTableMessage('无法加载数据明细。');
        return;
      }

      var envData = normalizeEnvData(data.env || []);
      if (envData.length === 0) {
        showError('查询结果为空，请检查设备 UUID 和时间范围');
        clearCharts();
        clearTable();
        document.getElementById('export-btn').classList.add('hidden');
        document.getElementById('summary-cards').classList.add('hidden');
        setChartHint('所选设备和时间范围内暂无数据。');
        setTableMessage('所选设备和时间范围内暂无数据。');
        currentData = null;
        return;
      }

      currentData = envData;
      currentUUID = uuid;
      document.getElementById('export-btn').classList.remove('hidden');
      updateCharts(envData, (endMicro - startMicro) / 1000);
      updateTable(envData);
    } catch (err) {
      showError('请求失败: ' + err.message);
      setChartHint('无法加载图表数据。');
      setTableMessage('无法加载数据明细。');
    } finally {
      showLoading(false);
      document.getElementById('query-btn').disabled = false;
    }
  }

  function normalizeEnvData(data) {
    var rows = [];
    for (var i = 0; i < data.length; i++) {
      var timeMs = new Date(data[i].timestamp).getTime();
      var temp = Number(data[i].temp);
      var hum = Number(data[i].hum);
      if (!Number.isFinite(timeMs) || !Number.isFinite(temp) || !Number.isFinite(hum)) {
        continue;
      }
      rows.push({
        timestamp: data[i].timestamp,
        timeMs: timeMs,
        temp: temp,
        hum: hum
      });
    }
    rows.sort(function(a, b) { return a.timeMs - b.timeMs; });
    return rows;
  }

  function showLoading(on) {
    var cl = document.getElementById('chart-loading');
    var hl = document.getElementById('hum-chart-loading');
    var tl = document.getElementById('table-loading');
    if (on) {
      cl.classList.remove('hidden');
      hl.classList.remove('hidden');
      tl.classList.remove('hidden');
    } else {
      cl.classList.add('hidden');
      hl.classList.add('hidden');
      tl.classList.add('hidden');
    }
  }

  function setChartHint(message) {
    var tempHint = document.getElementById('temp-chart-hint');
    var humHint = document.getElementById('hum-chart-hint');
    if (message) {
      tempHint.textContent = message;
      humHint.textContent = message;
      tempHint.classList.remove('hidden');
      humHint.classList.remove('hidden');
    } else {
      tempHint.classList.add('hidden');
      humHint.classList.add('hidden');
    }
  }

  function setTableMessage(message) {
    var tbody = document.querySelector('#data-table tbody');
    tbody.innerHTML = '<tr><td colspan="3" class="table-empty-cell">' + message + '</td></tr>';
  }

  function updateCharts(data, rangeMs) {
    setChartHint('');

    var tempPoints = [];
    var humPoints = [];
    for (var i = 0; i < data.length; i++) {
      var x = data[i].timeMs;
      tempPoints.push({x: x, y: data[i].temp});
      humPoints.push({x: x, y: data[i].hum});
    }

    var tempStats = computeStats(data, 'temp');
    var humStats = computeStats(data, 'hum');
    chartStats['tempChart'] = tempStats;
    chartStats['humChart'] = humStats;

    var last = data[data.length - 1];
    document.getElementById('sum-latest-temp').textContent = last.temp.toFixed(1) + ' ℃';
    document.getElementById('sum-latest-hum').textContent = last.hum.toFixed(1) + ' %';
    document.getElementById('sum-temp-range').textContent = tempStats.min.toFixed(1) + ' ~ ' + tempStats.max.toFixed(1) + ' ℃';
    document.getElementById('sum-hum-range').textContent = humStats.min.toFixed(1) + ' ~ ' + humStats.max.toFixed(1) + ' %';
    document.getElementById('sum-avg-temp').textContent = tempStats.avg.toFixed(1) + ' ℃';
    document.getElementById('sum-avg-hum').textContent = humStats.avg.toFixed(1) + ' %';
    document.getElementById('summary-cards').classList.remove('hidden');

    tempChart = createOrUpdateChart(tempChart, 'tempChart', '温度 (℃)', '#ef4444', tempPoints, tempStats, rangeMs, 'rgb(239, 68, 68)');
    humChart = createOrUpdateChart(humChart, 'humChart', '湿度 (%)', '#3b82f6', humPoints, humStats, rangeMs, 'rgb(59, 130, 246)');

    document.getElementById('tempChart').onmouseleave = function() { clearSyncedTooltip(humChart); };
    document.getElementById('humChart').onmouseleave = function() { clearSyncedTooltip(tempChart); };
  }

  function updateTable(data) {
    var tbody = document.querySelector('#data-table tbody');
    var html = '';
    for (var i = data.length - 1; i >= 0; i--) {
      var d = data[i];
      var x = d.timeMs;
      html += '<tr><td>' + formatBeijingFull(x) + '</td>' +
              '<td>' + d.temp.toFixed(1) + '</td>' +
              '<td>' + d.hum.toFixed(1) + '</td></tr>';
    }
    tbody.innerHTML = html;
  }

  function clearCharts() {
    if (tempChart) { tempChart.destroy(); tempChart = null; }
    if (humChart) { humChart.destroy(); humChart = null; }
    chartStats = {};
  }

  function clearTable() {
    var tbody = document.querySelector('#data-table tbody');
    tbody.innerHTML = '';
  }

  function exportCSV() {
    if (!currentData || currentData.length === 0) return;
    var lines = [];
    lines.push('\uFEFF时间,温度 (℃),湿度 (%)');
    for (var i = currentData.length - 1; i >= 0; i--) {
      var d = currentData[i];
      var x = d.timeMs;
      lines.push(formatBeijingFull(x) + ',' + d.temp.toFixed(1) + ',' + d.hum.toFixed(1));
    }
    var csv = lines.join('\n');
    var blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'env_' + currentUUID + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  window.addEventListener('DOMContentLoaded', initTimeDefaults);
</script>
</body>
</html>
