<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>温湿度数据查询 — 智能培养箱</title>
    <link rel="stylesheet" href="common.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="nav-brand" href="/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z"/><path d="M12 6v6l4 2"/></svg>
      智能培养箱
    </a>
    <div class="nav-links">
      <a href="/env.html" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"/></svg>
        <span>温湿度</span>
      </a>
      <a href="/colony.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
        <span>菌落图像</span>
      </a>
    </div>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <h1>温湿度数据查询</h1>
    <p>查询设备历史温度与湿度数据，支持图表可视化和 CSV 导出</p>
  </div>

  <div class="card">
    <div class="form-group">
      <label for="uuid">设备 UUID</label>
      <input class="form-input" type="text" id="uuid" placeholder="请输入设备 UUID">
    </div>

    <div class="query-row">
      <div class="custom-time">
        <div class="time-field">
          <label>起始时间</label>
          <input type="datetime-local" id="start-time">
        </div>
        <div class="time-field">
          <label>截止时间</label>
          <input type="datetime-local" id="end-time">
        </div>
      </div>

      <div class="quick-buttons">
        <button class="quick-btn" onclick="queryQuick(3600)">最近 1 小时</button>
        <button class="quick-btn" onclick="queryQuick(21600)">最近 6 小时</button>
        <button class="quick-btn" onclick="queryQuick(86400)">最近 24 小时</button>
        <button class="quick-btn" onclick="queryQuick(604800)">最近 7 天</button>
      </div>
    </div>

    <button class="btn-primary" id="query-btn" onclick="queryCustom()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      查询数据
    </button>
  </div>

  <div id="error-message" class="alert alert-error" style="display:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
    <span></span>
  </div>

  <div id="summary-cards" class="summary-cards hidden">
    <div class="summary-card">
      <div class="summary-label">Latest Temp</div>
      <div class="summary-value" id="sum-latest-temp">--</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Latest Humidity</div>
      <div class="summary-value" id="sum-latest-hum">--</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Temp Range</div>
      <div class="summary-value" id="sum-temp-range">--</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Humidity Range</div>
      <div class="summary-value" id="sum-hum-range">--</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Avg Temp</div>
      <div class="summary-value" id="sum-avg-temp">--</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Avg Humidity</div>
      <div class="summary-value" id="sum-avg-hum">--</div>
    </div>
  </div>

  <div class="chart-card">
    <div class="overlay-loading hidden" id="chart-loading">
      <div class="spinner"></div>
      Loading data...
    </div>
    <canvas id="tempChart"></canvas>
  </div>

  <div class="chart-card">
    <canvas id="humChart"></canvas>
  </div>

  <div class="table-card">
    <div class="table-toolbar">
      <h3>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;color:var(--text-muted)"><path d="M12 3v18"/><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/></svg>
        数据明细
      </h3>
      <button class="btn-success hidden" id="export-btn" onclick="exportCSV()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
        导出 CSV
      </button>
    </div>
    <div class="overlay-loading hidden" id="table-loading">
      <div class="spinner"></div>
      Loading data...
    </div>
    <div class="table-wrap">
      <table class="data-table" id="data-table">
        <thead>
          <tr>
            <th>时间</th>
            <th>温度 (℃)</th>
            <th>湿度 (%)</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<script src="common.js"></script>
<script>
  var tempChart = null;
  var humChart = null;
  var currentData = null;
  var currentUUID = '';

  function makeTickFormatter(rangeMs) {
    var fmt;
    if (rangeMs <= 7200000) {
      fmt = function(d) { return pad2(d.getUTCHours()) + ':' + pad2(d.getUTCMinutes()) + ':' + pad2(d.getUTCSeconds()); };
    } else if (rangeMs <= 86400000) {
      fmt = function(d) { return pad2(d.getUTCHours()) + ':' + pad2(d.getUTCMinutes()); };
    } else {
      fmt = function(d) { return (d.getUTCMonth() + 1) + '/' + pad2(d.getUTCDate()) + ' ' + pad2(d.getUTCHours()) + ':' + pad2(d.getUTCMinutes()); };
    }
    return function(value) {
      return fmt(utcMsToBeijing(value));
    };
  }

  async function doQuery(startMicro, endMicro) {
    var uuid = document.getElementById('uuid').value.trim();
    if (!uuid) {
      showError('请输入设备 UUID');
      return;
    }
    hideError();
    showLoading(true);

    try {
      var url = '/api/env?uuid=' + encodeURIComponent(uuid) +
                '&start=' + startMicro + '&end=' + endMicro;
      var resp = await fetch(url);
      var data = await resp.json();

      if (!data.sucess) {
        showError(data.message || '查询失败');
        return;
      }

      if (!data.env || data.env.length === 0) {
        showError('查询结果为空，请检查设备 UUID 和时间范围');
        clearCharts();
        clearTable();
        document.getElementById('export-btn').classList.add('hidden');
        document.getElementById('summary-cards').classList.add('hidden');
        currentData = null;
        return;
      }

      currentData = data.env;
      currentUUID = uuid;
      document.getElementById('export-btn').classList.remove('hidden');
      updateCharts(data.env, (endMicro - startMicro) / 1000);
      updateTable(data.env);
    } catch (err) {
      showError('请求失败: ' + err.message);
    } finally {
      showLoading(false);
    }
  }

  function showLoading(on) {
    var cl = document.getElementById('chart-loading');
    var tl = document.getElementById('table-loading');
    if (on) {
      cl.classList.remove('hidden');
      tl.classList.remove('hidden');
    } else {
      cl.classList.add('hidden');
      tl.classList.add('hidden');
    }
  }

  function updateCharts(data, rangeMs) {
    clearCharts();

    var tickFormat = makeTickFormatter(rangeMs);
    var tempPoints = [];
    var humPoints = [];
    var tempSum = 0, humSum = 0;
    var tempMin = Infinity, tempMax = -Infinity;
    var humMin = Infinity, humMax = -Infinity;
    for (var i = 0; i < data.length; i++) {
      var x = new Date(data[i].timestamp).getTime();
      tempPoints.push({x: x, y: data[i].temp});
      humPoints.push({x: x, y: data[i].hum});
      tempSum += data[i].temp;
      humSum += data[i].hum;
      if (data[i].temp < tempMin) tempMin = data[i].temp;
      if (data[i].temp > tempMax) tempMax = data[i].temp;
      if (data[i].hum < humMin) humMin = data[i].hum;
      if (data[i].hum > humMax) humMax = data[i].hum;
    }

    var last = data[data.length - 1];
    document.getElementById('sum-latest-temp').textContent = last.temp.toFixed(1) + ' ℃';
    document.getElementById('sum-latest-hum').textContent = last.hum.toFixed(1) + ' %';
    document.getElementById('sum-temp-range').textContent = tempMin.toFixed(1) + ' ~ ' + tempMax.toFixed(1) + ' ℃';
    document.getElementById('sum-hum-range').textContent = humMin.toFixed(1) + ' ~ ' + humMax.toFixed(1) + ' %';
    document.getElementById('sum-avg-temp').textContent = (tempSum / data.length).toFixed(1) + ' ℃';
    document.getElementById('sum-avg-hum').textContent = (humSum / data.length).toFixed(1) + ' %';
    document.getElementById('summary-cards').classList.remove('hidden');

    var xScale = {
      type: 'linear',
      ticks: {
        callback: tickFormat,
        maxTicksLimit: 12,
        autoSkip: true
      },
      grid: { color: 'rgba(0,0,0,0.04)' }
    };

    var tooltipCb = {
      title: function(ctx) {
        return formatBeijingFull(ctx[0].raw.x);
      }
    };

    var tempCtx = document.getElementById('tempChart').getContext('2d');
    tempChart = new Chart(tempCtx, {
      type: 'line',
      data: {
        datasets: [{
          label: '温度 (℃)',
          data: tempPoints,
          borderColor: '#ef4444',
          backgroundColor: 'rgba(239, 68, 68, 0.08)',
          borderWidth: 2,
          tension: 0.35,
          pointRadius: 0,
          pointHoverRadius: 5,
          pointHoverBackgroundColor: '#ef4444',
          fill: true
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: true, position: 'top', labels: { usePointStyle: true, padding: 20, font: { size: 13, family: 'Inter' } } },
          tooltip: { callbacks: tooltipCb, backgroundColor: '#1e293b', titleFont: { family: 'Inter' }, bodyFont: { family: 'Inter' }, padding: 10, cornerRadius: 8 }
        },
        scales: {
          x: xScale,
          y: { title: { display: true, text: '温度 (℃)', font: { size: 12, family: 'Inter' } }, grid: { color: 'rgba(0,0,0,0.04)' } }
        }
      }
    });

    var humCtx = document.getElementById('humChart').getContext('2d');
    humChart = new Chart(humCtx, {
      type: 'line',
      data: {
        datasets: [{
          label: '湿度 (%)',
          data: humPoints,
          borderColor: '#3b82f6',
          backgroundColor: 'rgba(59, 130, 246, 0.08)',
          borderWidth: 2,
          tension: 0.35,
          pointRadius: 0,
          pointHoverRadius: 5,
          pointHoverBackgroundColor: '#3b82f6',
          fill: true
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: true, position: 'top', labels: { usePointStyle: true, padding: 20, font: { size: 13, family: 'Inter' } } },
          tooltip: { callbacks: tooltipCb, backgroundColor: '#1e293b', titleFont: { family: 'Inter' }, bodyFont: { family: 'Inter' }, padding: 10, cornerRadius: 8 }
        },
        scales: {
          x: xScale,
          y: { title: { display: true, text: '湿度 (%)', font: { size: 12, family: 'Inter' } }, grid: { color: 'rgba(0,0,0,0.04)' } }
        }
      }
    });
  }

  function updateTable(data) {
    var tbody = document.querySelector('#data-table tbody');
    tbody.innerHTML = '';
    for (var i = 0; i < data.length; i++) {
      var d = data[i];
      var x = new Date(d.timestamp).getTime();
      var row = document.createElement('tr');
      row.innerHTML = '<td>' + formatBeijingFull(x) + '</td>' +
                      '<td>' + d.temp.toFixed(1) + '</td>' +
                      '<td>' + d.hum.toFixed(1) + '</td>';
      tbody.appendChild(row);
    }
  }

  function clearCharts() {
    if (tempChart) { tempChart.destroy(); tempChart = null; }
    if (humChart) { humChart.destroy(); humChart = null; }
  }

  function clearTable() {
    var tbody = document.querySelector('#data-table tbody');
    tbody.innerHTML = '';
  }

  function exportCSV() {
    if (!currentData || currentData.length === 0) return;
    var lines = [];
    lines.push('\uFEFF时间,温度 (℃),湿度 (%)');
    for (var i = 0; i < currentData.length; i++) {
      var d = currentData[i];
      var x = new Date(d.timestamp).getTime();
      lines.push(formatBeijingFull(x) + ',' + d.temp.toFixed(1) + ',' + d.hum.toFixed(1));
    }
    var csv = lines.join('\n');
    var blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'env_' + currentUUID + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  window.addEventListener('DOMContentLoaded', initTimeDefaults);
</script>
</body>
</html>
